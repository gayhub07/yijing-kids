name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          PUBLIC_SUPABASE_URL: https://jyalotiourdqocosdiaj.supabase.co
          PUBLIC_SUPABASE_ANON_KEY: sb_publishable_tcAWGZqxb7F8Ba5eR_7GYQ_ITdJ98m4
